<mat-dialog-content>
  <div class="p-10">
    <div>
      <h1 class="text-center font-bold text-2xl mb-3">Create new Thread</h1>
    </div>

    <form [formGroup]="createItemForm" (ngSubmit)="onSubmit()">
      <mat-form-field appearance="fill" class="w-full mb-4">
        <mat-label>Name</mat-label>
        <input type="text" placeholder="name" matInput formControlName="name">
      </mat-form-field>

      <mat-form-field appearance="fill" class="w-full mb-4">
        <mat-label>Description</mat-label>
        <input type="text" placeholder="Description" matInput formControlName="description">
      </mat-form-field>

      <mat-form-field appearance="fill" class="w-full mb-4">
        <mat-label>Category</mat-label>
        <input type="text" placeholder="category" matInput formControlName="category">
      </mat-form-field>

      <button mat-flat-button type="submit">Submit</button>
    </form>
  </div>
</mat-dialog-content>
<mat-dialog-actions>
    <button mat-button>No Thanks</button>
</mat-dialog-actions>
