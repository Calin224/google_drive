@if (item) {
  <p>{{ item.name }}</p>

  <button mat-flat-button (click)="openAddComponentDialog()">
    <mat-icon>add</mat-icon>
    Add images
  </button>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 2xl:grid-cols-4 gap-4 ">
    @for (photo of item.photos; track $index) {
      <mat-card appearance="outlined">
        <mat-card-header>
          <img mat-card-image src="{{ photo.url }}"/>
        </mat-card-header>

        <mat-card-actions>
          <button mat-icon-button (click)="deletePhoto(photo.id)">
            <mat-icon class="text-red-300"> delete</mat-icon>
          </button>
        </mat-card-actions>
      </mat-card>
    }
  </div>
